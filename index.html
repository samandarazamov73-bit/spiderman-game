<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Text Studio</title>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236366f1'/><text x='16' y='22' text-anchor='middle' font-family='Inter,sans-serif' font-weight='800' font-size='15' fill='%23fff'>3D</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Tailwind via CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: { 950:'#070709', 900:'#0a0a0d', 800:'#0e1014', 700:'#15171d', 600:'#1c1f27', 500:'#252932', 400:'#363a45', 300:'#4a4f5c', 200:'#7a7f8c', 100:'#b5b9c2', 50:'#e7e9ee' },
          accent: { DEFAULT:'#6366f1', hover:'#7c7df3' }
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'Menlo', 'monospace']
        },
        boxShadow: { glow: '0 0 24px rgba(99,102,241,0.35)' }
      }
    }
  };
</script>

<link rel="stylesheet" href="styles.css" />

<!-- Three.js + addons via importmap -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/",
    "opentype.js": "https://esm.sh/opentype.js@1.3.4"
  }
}
</script>
</head>
<body class="h-screen overflow-hidden flex flex-col bg-ink-900 text-ink-50 font-sans select-none">

<!-- ============ TOPBAR ============ -->
<header class="h-12 shrink-0 bg-ink-800 border-b border-ink-400/15 flex items-center px-3 gap-3">
  <div class="flex items-center gap-2.5 pr-3">
    <div class="w-7 h-7 rounded-md bg-gradient-to-br from-accent to-purple-500 flex items-center justify-center shadow-glow text-white font-bold text-[11px]">3D</div>
    <div class="flex flex-col leading-tight">
      <span class="text-xs font-bold">3D Text Studio</span>
      <span class="text-[10px] text-ink-200">by Kiro</span>
    </div>
  </div>
  <div class="h-5 w-px bg-ink-400/30"></div>
  <nav class="flex items-center gap-0.5 text-[11px]">
    <button class="px-2.5 py-1 text-ink-100 hover:text-ink-50 hover:bg-ink-700 rounded-md">File</button>
    <button class="px-2.5 py-1 text-ink-100 hover:text-ink-50 hover:bg-ink-700 rounded-md">Edit</button>
    <button class="px-2.5 py-1 text-ink-100 hover:text-ink-50 hover:bg-ink-700 rounded-md">View</button>
    <button class="px-2.5 py-1 text-ink-100 hover:text-ink-50 hover:bg-ink-700 rounded-md">Help</button>
  </nav>
  <div class="flex-1 flex justify-center">
    <div class="px-3 py-1 bg-ink-700/60 border border-ink-400/20 rounded-md text-[11px] text-ink-100 font-mono flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
      Untitled — 3D Text Composition
    </div>
  </div>
  <div class="flex items-center gap-1.5">
    <button id="topResetBtn" class="px-2.5 py-1.5 bg-ink-600 text-ink-50 hover:bg-ink-500 border border-ink-400/40 rounded-md text-xs font-medium flex items-center gap-1.5" title="Reset camera">⟲ <span class="hidden lg:inline">Reset Camera</span></button>
    <button id="topExportBtn" class="px-3 py-1.5 bg-accent hover:bg-accent-hover text-white rounded-md text-xs font-medium shadow-glow flex items-center gap-1.5">📷 Export PNG</button>
  </div>
</header>

<!-- ============ MAIN ============ -->
<div class="flex-1 flex min-h-0">

  <!-- Left tool rail -->
  <aside class="w-12 shrink-0 bg-ink-800 border-r border-ink-400/15 flex flex-col items-center py-2 gap-1">
    <button class="rail-btn" title="Text"><span>T</span></button>
    <button class="rail-btn" title="Typography"><span>¶</span></button>
    <button class="rail-btn" title="Geometry"><span>▣</span></button>
    <button class="rail-btn" title="Material"><span>✦</span></button>
    <button class="rail-btn" title="Environment"><span>◯</span></button>
    <button class="rail-btn" title="Animation"><span>↻</span></button>
    <button class="rail-btn" title="Export"><span>⤓</span></button>
    <div class="flex-1"></div>
    <span class="text-[9px] font-mono text-ink-200">v0.1</span>
  </aside>

  <!-- Viewport -->
  <main class="relative flex-1 min-w-0 bg-ink-900 viewport-grid-bg overflow-hidden">
    <canvas id="canvas" class="block w-full h-full"></canvas>

    <!-- HUD chips -->
    <div class="absolute top-3 left-3 flex items-center gap-1.5 pointer-events-none">
      <div class="hud-chip uppercase tracking-wider">Perspective · 32mm</div>
      <div id="hudFont" class="hud-chip uppercase tracking-wider">Helvetiker Bold</div>
      <div id="hudEnv" class="hud-chip uppercase tracking-wider">HDRI: Studio</div>
    </div>
    <div class="absolute top-3 right-3 pointer-events-none">
      <div id="hudText" class="hud-chip font-mono">"Kiro"</div>
    </div>

    <!-- Stats overlay -->
    <div id="statsOverlay" class="absolute top-12 right-3 flex flex-col gap-1 px-3 py-2 bg-ink-800/80 backdrop-blur border border-ink-400/20 rounded-md text-[10px] text-ink-100 font-mono pointer-events-none" style="display:none">
      <div class="flex justify-between gap-3"><span class="text-ink-200">FPS</span><span id="soFps">—</span></div>
      <div class="flex justify-between gap-3"><span class="text-ink-200">Triangles</span><span id="soTris">—</span></div>
      <div class="flex justify-between gap-3"><span class="text-ink-200">Vertices</span><span id="soVerts">—</span></div>
      <div class="flex justify-between gap-3"><span class="text-ink-200">Draw calls</span><span id="soCalls">—</span></div>
    </div>

    <!-- Floating viewport controls -->
    <div class="absolute bottom-3 left-3 flex items-center gap-1.5">
      <button id="autoRotateBtn" class="float-btn" title="Click to cycle animation modes">
        <span id="autoRotateIcon">↻</span> <span class="anim-label">Animate</span>
      </button>
      <button id="frameBtn" class="float-btn">⛶ Frame</button>
    </div>
    <div class="absolute bottom-3 right-3 flex items-center gap-2 text-[10px] text-ink-200 font-mono pointer-events-none">
      <span class="hidden md:inline">Drag to orbit · Scroll to zoom · Right-click to pan</span>
      <span class="md:hidden">Drag · Zoom · Pan</span>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="absolute inset-0 bg-ink-900/90 backdrop-blur flex items-center justify-center pointer-events-none">
      <div class="flex items-center gap-3 text-ink-100">
        <div class="w-4 h-4 rounded-full border-2 border-accent border-t-transparent animate-spin"></div>
        <span class="text-xs font-mono">Loading scene…</span>
      </div>
    </div>

    <!-- Vignette -->
    <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(ellipse_at_center,transparent_55%,rgba(0,0,0,0.45)_100%)]"></div>
  </main>

  <!-- Right properties panel -->
  <aside class="w-[320px] shrink-0 bg-ink-800 border-l border-ink-400/15 flex flex-col">
    <div class="px-4 py-3 border-b border-ink-400/15 flex items-center justify-between">
      <h2 class="text-xs font-semibold tracking-wide flex items-center gap-2">
        <span class="text-accent">⚙</span> Properties
      </h2>
      <span class="text-[10px] text-ink-200 font-mono">v0.1</span>
    </div>
    <div id="panel" class="flex-1 overflow-y-auto scrollbar-thin"></div>
    <div class="px-4 py-2 border-t border-ink-400/15 text-[10px] text-ink-200 font-mono flex items-center justify-between">
      <span>WebGL · PBR</span>
      <span class="flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-emerald-400"></span> Ready</span>
    </div>
  </aside>

</div>

<script type="module" src="./app.js"></script>
</body>
</html>
