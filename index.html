<script>

// ===================== CANVAS SETUP =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// ===================== AUDIO ENGINE =====================
let audioCtx = null;
let musicStarted = false;
let musicNodes = [];
let beatInterval = null;
const BPM = 88;
const BEAT = 60 / BPM;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function makeNoise(dur, gain=0.4) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = gain;
  src.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + dur);
  return {src, g};
}

function playKick(t) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(30, t+0.35);
  g.gain.setValueAtTime(0.6, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.38);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+0.4);
}

function playSnare(t) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.18, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2200; f.Q.value=0.7;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.35, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t+0.2);
}

function playHihat(t, open=false) {
  if (!audioCtx) return;
  const dur = open ? 0.12 : 0.045;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type='highpass'; f.frequency.value=8000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t+dur+0.01);
}

const bassNotes = [65.41, 55.00, 43.65, 49.00]; // C2 A1 F1 G1
function playBass(t, noteIdx) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(); o.type='sawtooth';
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=280;
  const g = audioCtx.createGain();
  o.frequency.value = bassNotes[noteIdx % bassNotes.length];
  g.gain.setValueAtTime(0.28, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + BEAT*0.85);
  o.connect(f); f.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+BEAT);
}

const melodyNotes = [261.63,293.66,329.63,349.23,392,440,392,349.23];
let melodyIdx = 0;
function playMelodyNote(t) {
  if (!audioCtx) return;
  const freq = melodyNotes[melodyIdx % melodyNotes.length]; melodyIdx++;
  const o = audioCtx.createOscillator(); o.type='triangle';
  const g = audioCtx.createGain();
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+BEAT*1.5);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+BEAT*1.6);
}

let beatCount = 0;
function scheduleBeat(t) {
  const b = beatCount % 8;
  // kick on 1,5
  if (b===0 || b===4) playKick(t);
  // snare on 3,7
  if (b===2 || b===6) playSnare(t);
  // hihat every beat, open on 2,4,6,8
  playHihat(t, b%2===1);
  // bass every beat
  playBass(t, Math.floor(beatCount/2));
  // melody every 2 beats
  if (b===0 || b===4) playMelodyNote(t);
  beatCount++;
}

function startMusic() {
  if (!audioCtx || musicStarted) return;
  musicStarted = true;
  let t = audioCtx.currentTime + 0.05;
  function schedule() {
    while (t < audioCtx.currentTime + 0.3) {
      scheduleBeat(t);
      t += BEAT;
    }
  }
  schedule();
  beatInterval = setInterval(schedule, 100);
}

function stopMusic() {
  if (beatInterval) { clearInterval(beatInterval); beatInterval=null; }
  musicStarted = false;
  beatCount = 0;
}

function sndWebThrow() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // whoosh
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.12, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=900; f.Q.value=2;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.22, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.12);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t+0.13);
  // snap click
  const o2 = audioCtx.createOscillator(); o2.type='sine'; o2.frequency.value=800;
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0.15, t+0.11);
  g2.gain.exponentialRampToValueAtTime(0.001, t+0.14);
  o2.connect(g2); g2.connect(audioCtx.destination);
  o2.start(t+0.11); o2.stop(t+0.15);
}

function sndWebShot() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type='sawtooth';
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=3000;
  const g = audioCtx.createGain();
  o.frequency.setValueAtTime(3000, t);
  o.frequency.exponentialRampToValueAtTime(300, t+0.12);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.13);
  o.connect(f); f.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+0.14);
  // noise burst
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.06, audioCtx.sampleRate);
  const nd = buf.getChannelData(0);
  for (let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
  const ns = audioCtx.createBufferSource(); ns.buffer = buf;
  const gn = audioCtx.createGain(); gn.gain.setValueAtTime(0.12,t); gn.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  ns.connect(gn); gn.connect(audioCtx.destination);
  ns.start(t); ns.stop(t+0.07);
}

function sndHit() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(); o.type='square'; o.frequency.value=200;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t+0.16);
}

function sndCoin() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [880,1320,1760].forEach((fr,i)=>{
    const o = audioCtx.createOscillator(); o.type='sine'; o.frequency.value=fr;
    const g = audioCtx.createGain(); g.gain.setValueAtTime(0.12,t+i*0.06); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t+i*0.06); o.stop(t+i*0.06+0.13);
  });
}

function sndExplosion() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.5, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*(1-i/(audioCtx.sampleRate*0.5));
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const f = audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  src.connect(f); f.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t+0.51);
}

// ===================== WORLD GENERATION =====================
const GROUND_Y = () => H - 60;
let camX = 0, camVX = 0;
let buildings = [];
let coins = [];
let particles = [];
let stars = [];
let clouds = [];

// Generate stars once
for (let i=0; i<120; i++) stars.push({ x: Math.random()*8000, y: Math.random()*(H*0.7), r: Math.random()*1.8+0.4, tw: Math.random()*Math.PI*2 });

// Generate clouds
for (let i=0; i<18; i++) clouds.push({ x: i*500 + Math.random()*200, y: 60+Math.random()*160, w: 80+Math.random()*140, speed: 0.15+Math.random()*0.15, layer: i%2 });

function genBuildings(startX, count) {
  let x = startX;
  for (let i=0; i<count; i++) {
    const w = 70 + Math.floor(Math.random()*80);
    const h = 100 + Math.floor(Math.random()*260);
    const color = `hsl(${200+Math.random()*60|0},${15+Math.random()*20|0}%,${18+Math.random()*18|0}%)`;
    const winColor = `hsl(${40+Math.random()*30|0},${70+Math.random()*20|0}%,${60+Math.random()*30|0}%)`;
    const hasAntenna = Math.random()>0.5;
    const hasTower = Math.random()>0.7;
    buildings.push({ x, y: GROUND_Y()-h, w, h, color, winColor, hasAntenna, hasTower, roofY: GROUND_Y()-h });
    x += w + 4 + Math.floor(Math.random()*20);
  }
}

genBuildings(-200, 120);

function spawnCoins(x, y, count=1) {
  for (let i=0;i<count;i++) {
    coins.push({ x: x + (Math.random()-0.5)*60, y: y - Math.random()*40, vy:-1.5-Math.random(), collected:false });
  }
}

// Sprinkle some coins on building rooftops
buildings.forEach((b,i) => { if (i%3===0) spawnCoins(b.x+b.w/2, b.roofY, 1); });

// ===================== ENTITIES =====================
let drones = [];
let webShots = [];
let bombs = [];
let civilians = [];
let particles2 = [];
let milesSprite = null; // miles cutscene

function spawnDrone(x, y, variant='normal') {
  drones.push({ x, y, vx: (Math.random()-0.5)*0.6, vy:0, hp:1, maxHp:1, variant, hitFlash:0, dead:false });
}

function spawnCivilian(x, y) {
  civilians.push({ x, y, saved:false, waveT:0 });
}

// Boss
let boss = null;
function spawnBoss(x, y) {
  boss = { x, y, vx:-1.2, vy:0, hp:10, maxHp:10, phase:0, bombTimer:0, hitFlash:0, dead:false, angle:0 };
}

// ===================== SPIDEY =====================
let spidey = {
  x:300, y:300, vx:0, vy:0,
  bodyAngle:0,
  onGround:false, jumps:0,
  hp:5, maxHp:5,
  web: null, // { ax, ay, len, attached }
  score:0, combo:0, comboTimer:0,
  coinsCollected:0,
  revived:false, // miles revival used
  knockedOut:false, knockTimer:0,
  totalDist:0, _lastX:0,
  chapterEnemiesKilled:0,
  chapterCivsSaved:0,
  alive:true,
};

let milesVisible = false;
let miles = { x:-200, y:300, vx:6, animT:0 };

// ===================== INPUT =====================
const keys = {};
let mouseX = W/2, mouseY = H/2;
let mouseDown = false;
let gameStarted = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='KeyF') shootWeb();
  if (e.code==='Space') { e.preventDefault(); doJump(); }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });

canvas.addEventListener('mousedown', e => {
  initAudio(); startMusic();
  gameStarted = true;
  if (e.button===0) { mouseDown=true; attachWeb(); }
  if (e.button===2) shootWeb();
});
canvas.addEventListener('mouseup', e => {
  if (e.button===0) { mouseDown=false; releaseWeb(); }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

function doJump() {
  if (!spidey.alive) return;
  if (spidey.onGround) { spidey.vy=-14; spidey.onGround=false; spidey.jumps=1; }
  else if (spidey.jumps < 2) { spidey.vy=-11; spidey.jumps++; }
}

// ===================== WEB SWING =====================
function attachWeb() {
  if (!spidey.alive) return;
  sndWebThrow();
  // Find nearest building rooftop above player (in world coords)
  const wx = spidey.x; const wy = spidey.y;
  let best = null, bestD = 999999;
  buildings.forEach(b => {
    const rx = b.x + b.w/2;
    const ry = b.roofY;
    if (ry > wy - 20) return; // must be above
    const dx = rx - wx, dy = ry - wy;
    const d = Math.sqrt(dx*dx+dy*dy);
    if (d < 500 && d < bestD) { bestD=d; best={x:rx, y:ry}; }
  });
  if (best) {
    const dx = best.x - wx, dy = best.y - wy;
    spidey.web = { ax: best.x, ay: best.y, len: Math.sqrt(dx*dx+dy*dy), attached: true };
  }
}

function releaseWeb() {
  spidey.web = null;
}

// ===================== WEB SHOT =====================
function shootWeb() {
  if (!spidey.alive) return;
  initAudio();
  sndWebShot();
  const worldMX = mouseX + camX;
  const worldMY = mouseY;
  const dx = worldMX - spidey.x;
  const dy = worldMY - spidey.y;
  const d = Math.sqrt(dx*dx+dy*dy) || 1;
  const speed = 22;
  webShots.push({ x:spidey.x, y:spidey.y, vx: dx/d*speed, vy: dy/d*speed, life:60 });
}

// ===================== STORY FUNCTIONS =====================
function spawnDronesForChapter(n, variant) {
  drones = drones.filter(d=>!d.dead);
  for (let i=0;i<n;i++) {
    const bx = spidey.x + 300 + i*180 + Math.random()*120;
    const by = GROUND_Y() - 120 - Math.random()*160;
    spawnDrone(bx, by, variant);
  }
  spidey.chapterEnemiesKilled = 0;
}

function spawnCivsForChapter(n) {
  civilians = [];
  for (let i=0;i<n;i++) {
    const bIdx = Math.min(buildings.length-1, buildings.findIndex(b=>b.x>spidey.x) + i*3 + 1);
    const b = buildings[Math.max(0,bIdx)];
    if (b) spawnCivilian(b.x+b.w/2, b.roofY-20);
  }
  spidey.chapterCivsSaved = 0;
}

function showCutscene(ch, onDone) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<div class="emoji">${ch.cutsceneEmoji||ch.emoji}</div><h1>${ch.cutsceneTitle||ch.title}</h1><p>${(ch.cutsceneText||ch.story).replace(/\n/g,'<br>')}</p><button id="ovBtn">Продолжить ▶</button>`;
  ov.style.display = 'flex';
  document.getElementById('ovBtn').onclick = () => {
    ov.style.display='none';
    if (onDone) onDone();
  };
}

function showTitle(title, sub, duration=3000) {
  // Flash title at top
  const cb = document.getElementById('chapterBox');
  cb.innerHTML = `<b>${title}</b>${sub?'<br><small>'+sub+'</small>':''}`;
  cb.style.color='#ffe000';
  setTimeout(()=>{ cb.style.color='#fff'; }, duration);
}

let dlgQueue = [];
let dlgPlaying = false;
function playDialog(lines, onDone) {
  dlgQueue = lines.slice();
  dlgPlaying = true;
  showNextDlg(onDone);
}

function showNextDlg(onDone) {
  if (!dlgQueue.length) {
    dlgPlaying = false;
    document.getElementById('dialogBox').style.display='none';
    if (onDone) onDone();
    return;
  }
  const line = dlgQueue.shift();
  document.getElementById('dlgSpeaker').textContent = line.speaker || '';
  document.getElementById('dlgText').textContent = line.text;
  document.getElementById('dialogBox').style.display='block';
  document.getElementById('dialogBox').style.borderColor = line.color || 'rgba(255,255,255,0.18)';
  setTimeout(()=>showNextDlg(onDone), line.duration || 3000);
}

function startChapter(idx) {
  if (idx >= chapters.length) { winGame(); return; }
  currentChapter = idx;
  chapterState = 'playing';
  const ch = chapters[idx];
  _startX = spidey.x;
  spidey.chapterEnemiesKilled = 0;
  spidey.chapterCivsSaved = 0;
  spidey.coinsCollected = 0;
  showTitle(ch.title, ch.story);
  document.getElementById('chapterBox').innerHTML = `<b>${ch.title}</b>`;

  if (ch.targetType === 'cutscene') {
    chapterState = 'cutscene';
    showCutscene(ch, () => {
      // Special: chapter 11 = Miles arrival story
      if (idx===11) {
        milesVisible = true;
        miles.x = spidey.x + 400;
        miles.y = spidey.y;
        miles.vx = -5;
        setTimeout(()=>{
          playDialog([
            {speaker:'🕷️ Майлз', text:'Держись, Питер! Я здесь!', color:'#a855f7', duration:3000},
            {speaker:'😵 Питер', text:'...Майлз? Ты... спас меня.', color:'#e00', duration:3000},
          ], ()=>{
            milesCutsceneDone = true;
            spidey.coinsCollected = 1;
            chapterState = 'playing';
            setTimeout(()=>completeChapter(), 500);
          });
        }, 1200);
      } else if (idx===14) {
        // Victory
        spidey.coinsCollected = 1;
        chapterState = 'playing';
        winGame();
      } else {
        spidey.coinsCollected = 1;
        chapterState = 'playing';
        setTimeout(()=>completeChapter(), 400);
      }
    });
    // Run cutscene for chapter with onStart (like boss cutscene ch13)
    if (ch.onStart && idx===13) {
      showCutscene(ch, ()=>{
        if (ch.onStart) ch.onStart(ch);
        chapterState='playing';
      });
      return;
    }
  } else {
    // If has cutscene prefix (story cutscene before gameplay)
    if (ch.cutsceneText) {
      chapterState='cutscene';
      showCutscene(ch, ()=>{
        chapterState='playing';
        if (ch.onStart) ch.onStart(ch);
      });
    } else {
      if (ch.onStart) ch.onStart(ch);
    }
  }
}

function completeChapter() {
  if (currentChapter >= chapters.length-1) { winGame(); return; }
  const ch = chapters[currentChapter];
  playDialog([{speaker:'✅', text:ch.title+' — выполнено!', color:'#0f0', duration:2000}], ()=>{
    startChapter(currentChapter+1);
  });
}

function checkChapterComplete() {
  if (chapterState !== 'playing') return;
  const ch = chapters[currentChapter];
  if (!ch) return;
  if (ch.targetType==='distance') {
    const dist = (spidey.x - _startX);
    if (dist >= ch.targetVal) completeChapter();
  } else if (ch.targetType==='enemies') {
    if (spidey.chapterEnemiesKilled >= ch.targetVal) completeChapter();
  } else if (ch.targetType==='civilians') {
    if (spidey.chapterCivsSaved >= ch.targetVal) completeChapter();
  } else if (ch.targetType==='boss') {
    if (boss && boss.dead) completeChapter();
  } else if (ch.targetType==='cutscene') {
    if (spidey.coinsCollected >= 1) completeChapter();
  }
}

// ===================== PHYSICS UPDATE =====================
const GRAVITY = 0.55;
const FRICTION = 0.88;

function updatePhysics(dt) {
  if (!spidey.alive) return;
  if (spidey.knockedOut) {
    spidey.knockTimer -= dt;
    if (spidey.knockTimer <= 0) startMilesRevival();
    return;
  }

  // Air control
  if (keys['KeyA']) spidey.vx -= 0.7;
  if (keys['KeyD']) spidey.vx += 0.7;

  // Web swing physics
  if (spidey.web && spidey.web.attached) {
    const { ax, ay } = spidey.web;
    let dx = spidey.x - ax, dy = spidey.y - ay;
    let dist = Math.sqrt(dx*dx+dy*dy);

    // Shift = pull web shorter
    if (keys['ShiftLeft']||keys['ShiftRight']) {
      spidey.web.len = Math.max(60, spidey.web.len - 3);
    }

    // Constrain to rope length
    if (dist > spidey.web.len) {
      const nx = dx/dist, ny = dy/dist;
      spidey.x = ax + nx * spidey.web.len;
      spidey.y = ay + ny * spidey.web.len;
      // Remove radial component of velocity
      const dot = spidey.vx*nx + spidey.vy*ny;
      spidey.vx -= dot*nx * 0.85;
      spidey.vy -= dot*ny * 0.85;
    }

    // Pendulum: tangential gravity
    dx = spidey.x - ax; dy = spidey.y - ay;
    dist = Math.sqrt(dx*dx+dy*dy)||1;
    const tx = -dy/dist, ty = dx/dist;
    const gTan = (spidey.vx*tx + spidey.vy*ty);
    spidey.vx += GRAVITY * (dy/dist) * 0.8;
    spidey.vy += GRAVITY * (dx/dist>0 ? -1:1) * Math.abs(dx/dist) * 0.5;

    // bodyAngle while swinging
    spidey.bodyAngle = Math.atan2(spidey.x-ax, -(spidey.y-ay));
  }

  spidey.vy += GRAVITY;
  spidey.vx *= FRICTION;
  // Cap speed
  spidey.vx = Math.max(-18, Math.min(18, spidey.vx));
  spidey.vy = Math.max(-22, Math.min(22, spidey.vy));

  spidey.x += spidey.vx;
  spidey.y += spidey.vy;

  // Ground collision
  const groundY = GROUND_Y();
  if (spidey.y >= groundY - 20) {
    spidey.y = groundY - 20;
    spidey.vy = 0;
    spidey.onGround = true;
    spidey.jumps = 0;
    spidey.bodyAngle = 0; // stands upright
    if (mouseDown) { releaseWeb(); }
  } else {
    spidey.onGround = false;
  }

  // Building top collision (landing on roofs)
  buildings.forEach(b => {
    if (spidey.x > b.x-10 && spidey.x < b.x+b.w+10) {
      if (spidey.y >= b.roofY-20 && spidey.y <= b.roofY+10 && spidey.vy >= 0) {
        spidey.y = b.roofY - 20;
        spidey.vy = 0;
        spidey.onGround = true;
        spidey.jumps = 0;
        spidey.bodyAngle = 0;
      }
    }
  });

  // Extend world if needed
  if (buildings.length > 0) {
    const lastB = buildings[buildings.length-1];
    if (spidey.x > lastB.x - 800) genBuildings(lastB.x + lastB.w + 10, 20);
  }

  // Distance tracking
  if (spidey.x > spidey._lastX) {
    spidey.totalDist += spidey.x - spidey._lastX;
  }
  spidey._lastX = spidey.x;

  // Camera
  const targetCamX = spidey.x - W*0.38 + spidey.vx*12;
  camX += (targetCamX - camX) * 0.08;

  // Combo timer
  if (spidey.combo > 0) {
    spidey.comboTimer -= dt;
    if (spidey.comboTimer <= 0) {
      spidey.combo = 0;
      document.getElementById('comboBox').textContent = '';
    }
  }

  // Cloud movement
  clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) c.x = W + c.w; });
}

// ===================== COINS =====================
function updateCoins() {
  coins.forEach(c => {
    if (c.collected) return;
    c.vy += 0.3; c.y += c.vy;
    const groundY = GROUND_Y();
    if (c.y > groundY - 8) { c.y = groundY-8; c.vy *= -0.4; }
    // Collect
    const dx = c.x - spidey.x, dy = c.y - spidey.y;
    if (Math.sqrt(dx*dx+dy*dy) < 28) {
      c.collected = true;
      spidey.score += 10;
      spidey.combo++;
      spidey.comboTimer = 180;
      spidey.coinsCollected++;
      sndCoin();
      if (spidey.combo > 1) document.getElementById('comboBox').textContent = `x${spidey.combo} COMBO!`;
      document.getElementById('scoreVal').textContent = spidey.score;
      spawnParticles(c.x, c.y, '#ffe000', 6);
    }
  });
  coins = coins.filter(c=>!c.collected);
}

// ===================== WEB SHOTS UPDATE =====================
function updateWebShots() {
  webShots.forEach(ws => {
    ws.x += ws.vx; ws.y += ws.vy; ws.life--;
    // Hit drones
    drones.forEach(d => {
      if (d.dead) return;
      if (Math.abs(ws.x-d.x)<20 && Math.abs(ws.y-d.y)<20) {
        killDrone(d);
        ws.life = 0;
      }
    });
    // Hit boss
    if (boss && !boss.dead) {
      if (Math.abs(ws.x-boss.x)<40 && Math.abs(ws.y-boss.y)<40) {
        boss.hp--; boss.hitFlash=10;
        sndHit();
        spawnParticles(boss.x, boss.y, '#0f0', 8);
        ws.life=0;
        if (boss.hp<=0) { boss.dead=true; sndExplosion(); spawnParticles(boss.x,boss.y,'#f80',20); }
      }
    }
  });
  webShots = webShots.filter(ws=>ws.life>0);
}

function killDrone(d) {
  if (d.dead) return;
  d.dead = true;
  spidey.score += 50 * Math.max(1, spidey.combo);
  spidey.chapterEnemiesKilled++;
  spidey.combo++;
  spidey.comboTimer = 200;
  document.getElementById('scoreVal').textContent = spidey.score;
  if (spidey.combo > 1) document.getElementById('comboBox').textContent = `x${spidey.combo} COMBO!`;
  sndExplosion();
  spawnParticles(d.x, d.y, d.variant==='orange'?'#f80':'#4af', 12);
}

// ===================== DRONES UPDATE =====================
function updateDrones(dt) {
  drones = drones.filter(d=>!d.dead);
  drones.forEach(d => {
    d.hitFlash = Math.max(0, d.hitFlash-1);
    // Drift toward player
    const dx = spidey.x - d.x, dy = spidey.y - d.y;
    const dist = Math.sqrt(dx*dx+dy*dy)||1;
    const speed = d.variant==='orange' ? 1.4 : 0.8;
    d.vx += dx/dist*speed*0.05;
    d.vy += dy/dist*speed*0.05;
    d.vx *= 0.95; d.vy *= 0.95;
    d.x += d.vx; d.y += d.vy;

    // Ram player
    if (dist < 28 && spidey.alive) {
      const spd = Math.sqrt(spidey.vx**2+spidey.vy**2);
      if (spd > 9) { killDrone(d); return; }
      takeDamage(1);
      d.vx = -d.vx*2; d.vy = -d.vy*2;
    }
  });
}

// ===================== CIVILIANS UPDATE =====================
function updateCivilians() {
  civilians.forEach(civ => {
    if (civ.saved) return;
    civ.waveT += 0.05;
    const dx = civ.x-spidey.x, dy = civ.y-spidey.y;
    if (Math.sqrt(dx*dx+dy*dy)<40) {
      civ.saved = true;
      spidey.score += 100;
      spidey.chapterCivsSaved++;
      document.getElementById('scoreVal').textContent = spidey.score;
      spawnParticles(civ.x, civ.y, '#ff0', 10);
      sndCoin();
    }
  });
  civilians = civilians.filter(c=>!c.saved);
}

// ===================== BOSS UPDATE =====================
function updateBoss(dt) {
  if (!boss || boss.dead) return;
  boss.hitFlash = Math.max(0, boss.hitFlash-1);
  boss.angle += 0.02;
  boss.bombTimer += dt;

  // Phase 2 at half HP
  const spd = boss.hp <= boss.maxHp/2 ? 2.2 : 1.4;
  const aggrInterval = boss.hp <= boss.maxHp/2 ? 3 : 5;

  // Boss orbits player
  const dx = spidey.x - boss.x, dy = spidey.y-60 - boss.y;
  boss.vx += dx * 0.005; boss.vy += dy * 0.005;
  boss.vx = Math.max(-spd, Math.min(spd, boss.vx));
  boss.vy = Math.max(-spd, Math.min(spd, boss.vy));
  boss.x += boss.vx; boss.y += boss.vy;

  // Throw bombs
  if (boss.bombTimer > aggrInterval * 60) {
    boss.bombTimer = 0;
    throwBomb();
  }

  // Collide with player
  if (Math.sqrt((boss.x-spidey.x)**2+(boss.y-spidey.y)**2)<40) {
    takeDamage(1);
    boss.vx = -boss.vx*2; boss.vy = -boss.vy*2;
  }
}

function throwBomb() {
  if (!boss) return;
  const dx = spidey.x-boss.x, dy = spidey.y-boss.y;
  const d = Math.sqrt(dx*dx+dy*dy)||1;
  const speed = 5;
  bombs.push({ x:boss.x, y:boss.y, vx:dx/d*speed, vy:dy/d*speed-3, life:180, exploded:false });
}

function updateBombs(dt) {
  bombs.forEach(b => {
    b.vy += 0.25; b.x += b.vx; b.y += b.vy; b.life--;
    if (b.y > GROUND_Y()-10 || b.life<=0) {
      b.exploded = true;
      sndExplosion();
      spawnParticles(b.x, b.y, '#f80', 14);
      if (Math.sqrt((b.x-spidey.x)**2+(b.y-spidey.y)**2)<60) takeDamage(1);
    }
  });
  bombs = bombs.filter(b=>!b.exploded);
}

// ===================== PARTICLES =====================
function spawnParticles(x, y, color, n=8) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 2+Math.random()*5;
    particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2, life:35+Math.random()*25, color, r:2+Math.random()*3 });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--;
    p.vx*=0.94; p.vy*=0.94;
  });
  particles = particles.filter(p=>p.life>0);
}

// ===================== HEALTH =====================
function takeDamage(n) {
  if (!spidey.alive || spidey.knockedOut) return;
  spidey.hp = Math.max(0, spidey.hp - n);
  sndHit();
  spawnParticles(spidey.x, spidey.y, '#f00', 10);
  updateHearts();
  if (spidey.hp <= 0) {
    if (!spidey.revived) {
      spidey.knockedOut = true;
      spidey.knockTimer = 480; // 8 seconds at 60fps
      spidey.web = null;
      spidey.vx=0; spidey.vy=3;
      spidey.bodyAngle = Math.PI/2; // lying flat
      showKnockoutOverlay();
    } else {
      loseGame();
    }
  }
}

function updateHearts() {
  const el = document.getElementById('hearts');
  el.innerHTML = '';
  for (let i=0;i<spidey.maxHp;i++) {
    const span = document.createElement('span');
    span.textContent = i < spidey.hp ? '❤️' : '🖤';
    el.appendChild(span);
  }
}

      miles.y = spidey.y;

        {speaker:'🕷️ Майлз Моралес', text:'Держись, Питер! Я здесь!', color:'#a855f7', duration:3000},
        {speaker:'😵 Питер Паркер', text:'...Майлз? Ты... спас меня.', color:'#e00', duration:3000},

// ===================== RENDER BACKGROUND =====================
function renderBackground() {
  // Night sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#050818');
  grad.addColorStop(0.6,'#0a1228');
  grad.addColorStop(1,'#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Moon
  const moonX = (W*0.75 - camX*0.03 + 8000) % (W+100);
  ctx.save();
  ctx.shadowColor='#fffde0'; ctx.shadowBlur=40;
  ctx.fillStyle='#fffde0';
  ctx.beginPath(); ctx.arc(moonX, 70, 36, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();

  // Stars
  const t = Date.now()/1000;
  ctx.fillStyle='#fff';
  stars.forEach(s => {
    const sx = (s.x - camX*0.03 + 8000*10) % (W+20);
    const tw = Math.sin(s.tw + t*1.2) * 0.5 + 0.5;
    ctx.globalAlpha = 0.3 + tw*0.7;
    ctx.beginPath(); ctx.arc(sx, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  // Clouds
  clouds.forEach(c => {
    ctx.globalAlpha = c.layer===0 ? 0.12 : 0.07;
    ctx.fillStyle='#8899cc';
    drawCloud(c.x - camX*(c.layer===0?0.05:0.02), c.y, c.w);
  });
  ctx.globalAlpha=1;

  // Far buildings (parallax)
  ctx.fillStyle='#0d1a2d';
  const farOff = camX * 0.25;
  for (let i=0;i<25;i++) {
    const bx = ((i*180 - farOff % 180 + 180*25) % (180*25)) - 60;
    const bh = 80 + ((i*73+13) % 100);
    ctx.fillRect(bx - (farOff|0)%180*0, GROUND_Y()-bh, 60+i%3*20, bh);
  }
  ctx.fillStyle='#0a1520';
  for (let i=0;i<30;i++) {
    const bx = ((i*140 - (camX*0.35)|0 % (140*30) + 140*30)) % (140*30);
    const bh = 50 + (i*37)%80;
    ctx.fillRect(bx, GROUND_Y()-bh, 50+i%4*15, bh);
  }
}

function drawCloud(x, y, w) {
  ctx.beginPath();
  ctx.arc(x, y, w*0.3, 0, Math.PI*2);
  ctx.arc(x+w*0.25, y-w*0.1, w*0.25, 0, Math.PI*2);
  ctx.arc(x+w*0.5, y, w*0.28, 0, Math.PI*2);
  ctx.fill();
}

// ===================== RENDER BUILDINGS =====================
function renderBuildings() {
  buildings.forEach(b => {
    const sx = b.x - camX;
    if (sx > W+20 || sx+b.w < -20) return;
    // Main body
    ctx.fillStyle = b.color;
    ctx.fillRect(sx, b.y, b.w, b.h);
    // Roof edge highlight
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.fillRect(sx, b.y, b.w, 3);
    // Windows
    const rows = Math.floor(b.h/24);
    const cols = Math.floor(b.w/18);
    for (let r=0;r<rows;r++) {
      for (let c=0;c<cols;c++) {
        if ((r*cols+c+b.x|0)%3===0) continue; // some dark
        const wx2 = sx + 6 + c*18;
        const wy2 = b.y + 8 + r*24;
        const lit = ((r+c + (b.x|0))%5 < 3);
        ctx.fillStyle = lit ? b.winColor : 'rgba(30,30,50,0.8)';
        ctx.fillRect(wx2, wy2, 10, 14);
      }
    }
    // Antenna
    if (b.hasAntenna) {
      ctx.strokeStyle='#556';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(sx+b.w/2, b.y);
      ctx.lineTo(sx+b.w/2, b.y-30);
      ctx.stroke();
      ctx.fillStyle='#f44';
      ctx.beginPath(); ctx.arc(sx+b.w/2, b.y-30, 3, 0, Math.PI*2); ctx.fill();
    }
    // Water tower
    if (b.hasTower) {
      const tx = sx + b.w*0.7;
      const ty = b.y - 20;
      ctx.fillStyle='#5a3a1a';
      ctx.fillRect(tx-12, ty, 24, 20);
      ctx.fillStyle='#3a2010';
      ctx.beginPath();
      ctx.moveTo(tx-14, ty); ctx.lineTo(tx+14, ty);
      ctx.lineTo(tx+10, ty-8); ctx.lineTo(tx-10, ty-8);
      ctx.closePath(); ctx.fill();
    }
  });
}

// ===================== RENDER STREET =====================
function renderStreet() {
  const groundY = GROUND_Y();
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(0, groundY, W, H-groundY);
  // Road lines
  ctx.strokeStyle='rgba(255,200,0,0.25)';
  ctx.lineWidth=3;
  ctx.setLineDash([40,30]);
  ctx.lineDashOffset = -(camX%70);
  ctx.beginPath(); ctx.moveTo(0,groundY+20); ctx.lineTo(W,groundY+20); ctx.stroke();
  ctx.setLineDash([]);
}

// ===================== RENDER ENTITIES =====================
function renderCoins() {
  const t = Date.now()/500;
  coins.forEach(c => {
    const sx = c.x - camX;
    ctx.save();
    ctx.shadowColor='#ffe000'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffe000';
    ctx.beginPath();
    ctx.arc(sx, c.y, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff8';
    ctx.beginPath();
    ctx.arc(sx-2, c.y-2, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function renderDrones() {
  const t = Date.now()/400;
  drones.forEach(d => {
    if (d.dead) return;
    const sx = d.x - camX;
    ctx.save();
    if (d.hitFlash>0) { ctx.shadowColor='#fff'; ctx.shadowBlur=20; }
    const col = d.variant==='orange' ? '#f80' : '#4af';
    const col2 = d.variant==='orange' ? '#fa4' : '#08f';
    // Body
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(sx, d.y + Math.sin(t)*4, 14, 0, Math.PI*2); ctx.fill();
    // Rotors x4
    [[-18,-8],[18,-8],[-18,8],[18,8]].forEach(([ox,oy])=>{
      ctx.fillStyle=col2;
      ctx.save();
      ctx.translate(sx+ox, d.y+oy+Math.sin(t)*4);
      ctx.rotate(t*4);
      ctx.fillRect(-8,-2,16,4);
      ctx.restore();
    });
    // Eye
    ctx.fillStyle='#f00';
    ctx.beginPath(); ctx.arc(sx+5, d.y+Math.sin(t)*4-2, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function renderCivilians() {
  civilians.forEach(civ => {
    if (civ.saved) return;
    const sx = civ.x - camX;
    const wave = Math.sin(civ.waveT)*6;
    ctx.save();
    // Body
    ctx.fillStyle='#f5c89a';
    ctx.beginPath(); ctx.arc(sx, civ.y-30, 9, 0, Math.PI*2); ctx.fill(); // head
    ctx.fillStyle='#3399ff';
    ctx.fillRect(sx-7, civ.y-21, 14, 18); // shirt
    ctx.fillStyle='#333';
    ctx.fillRect(sx-6, civ.y-3, 5, 12); // pants L
    ctx.fillRect(sx+1, civ.y-3, 5, 12); // pants R
    // Waving arm
    ctx.strokeStyle='#f5c89a'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(sx+7, civ.y-18);
    ctx.lineTo(sx+18, civ.y-18+wave);
    ctx.stroke();
    // Help sign
    ctx.fillStyle='rgba(255,50,50,0.9)';
    ctx.font='bold 11px Arial';
    ctx.fillText('HELP!', sx-12, civ.y-44);
    ctx.restore();
  });
}

function renderBoss() {
  if (!boss || boss.dead) return;
  const sx = boss.x - camX;
  ctx.save();
  if (boss.hitFlash>0) { ctx.shadowColor='#fff'; ctx.shadowBlur=24; }
  ctx.translate(sx, boss.y);
  ctx.rotate(Math.sin(boss.angle)*0.12);
  // Glider
  ctx.fillStyle='#2a2a2a';
  ctx.beginPath();
  ctx.moveTo(-50,10); ctx.lineTo(0,-8); ctx.lineTo(50,10);
  ctx.lineTo(40,18); ctx.lineTo(0,8); ctx.lineTo(-40,18);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#888';
  ctx.fillRect(-6,-15,12,5);
  // Goblin body
  ctx.fillStyle='#5aad1e';
  ctx.beginPath(); ctx.arc(0,-28,14,0,Math.PI*2); ctx.fill(); // head
  ctx.fillStyle='#4a9a10';
  ctx.fillRect(-10,-22,20,22); // body
  // Eyes
  ctx.fillStyle='#ff0';
  [-6,5].forEach(x=>{
    ctx.beginPath(); ctx.arc(x,-30,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(x,-30,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff0';
  });
  // Hat
  ctx.fillStyle='#3a8a0a';
  ctx.beginPath();
  ctx.moveTo(-16,-40); ctx.lineTo(16,-40); ctx.lineTo(8,-58); ctx.lineTo(-8,-58); ctx.closePath(); ctx.fill();
  ctx.restore();

  // HP bar
  const barW = 80, bx = sx - barW/2;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-2, boss.y-62, barW+4, 12);
  ctx.fillStyle='#f00'; ctx.fillRect(bx, boss.y-60, barW*(boss.hp/boss.maxHp), 8);
  ctx.fillStyle='#0f0'; ctx.fillRect(bx, boss.y-60, Math.max(0,barW*(boss.hp/boss.maxHp)), 8);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(bx, boss.y-60, barW, 8);
  ctx.fillStyle='#fff'; ctx.font='bold 9px Arial'; ctx.fillText('GOBLIN', bx+18, boss.y-52);
}

function renderBombs() {
  bombs.forEach(b => {
    const sx = b.x - camX;
    ctx.save();
    ctx.fillStyle='#f80';
    ctx.shadowColor='#fa0'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(sx, b.y, 8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff0';
    ctx.beginPath(); ctx.arc(sx-3, b.y-3, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function renderWebShots() {
  webShots.forEach(ws => {
    const sx = ws.x - camX;
    ctx.save();
    ctx.strokeStyle='rgba(220,220,255,0.9)'; ctx.lineWidth=2;
    ctx.shadowColor='#aaf'; ctx.shadowBlur=8;
    ctx.beginPath();
    const len = Math.sqrt(ws.vx**2+ws.vy**2);
    ctx.moveTo(sx - ws.vx/len*12, ws.y - ws.vy/len*12);
    ctx.lineTo(sx, ws.y);
    ctx.stroke();
    ctx.restore();
  });
}

function renderParticles() {
  particles.forEach(p => {
    const sx = p.x - camX;
    ctx.globalAlpha = Math.max(0, p.life/40);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(sx, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ===================== RENDER SPIDEY =====================
function renderSpidey() {
  const sx = spidey.x - camX;
  const sy = spidey.y;
  ctx.save();

  // Draw web line
  if (spidey.web && spidey.web.attached) {
    ctx.strokeStyle='rgba(200,200,255,0.7)';
    ctx.lineWidth=2;
    ctx.shadowColor='#aaf'; ctx.shadowBlur=4;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(spidey.web.ax - camX, spidey.web.ay);
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  ctx.translate(sx, sy);
  ctx.rotate(spidey.bodyAngle);

  // Draw Spider-Man body
  const c1='#e00', c2='#00f', c3='#1a1aff';
  // Legs
  ctx.fillStyle=c2;
  ctx.fillRect(-6, 8, 5, 14); // left leg
  ctx.fillRect(1, 8, 5, 14);  // right leg
  // Boot tips
  ctx.fillStyle='#000';
  ctx.fillRect(-7,20,6,4);
  ctx.fillRect(1,20,6,4);

  // Body
  ctx.fillStyle=c1;
  ctx.beginPath(); ctx.ellipse(0, 0, 11, 14, 0, 0, Math.PI*2); ctx.fill();

  // Arms
  const t2 = Date.now()/300;
  const armSwing = spidey.onGround ? Math.sin(spidey.vx*0.5)*10 : 15;
  ctx.fillStyle=c2;
  // Left arm
  ctx.save(); ctx.rotate(-0.5 - armSwing*0.015);
  ctx.fillRect(-14, -6, 12, 5); ctx.restore();
  // Right arm  
  ctx.save(); ctx.rotate(0.5 + armSwing*0.015);
  ctx.fillRect(2, -6, 12, 5); ctx.restore();

  // Head
  ctx.fillStyle=c1;
  ctx.beginPath(); ctx.arc(0, -18, 11, 0, Math.PI*2); ctx.fill();
  // Eyes (white lenses)
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.ellipse(-4, -20, 5, 3.5, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4, -20, 5, 3.5, 0.3, 0, Math.PI*2); ctx.fill();
  // Web pattern lines on torso
  ctx.strokeStyle='rgba(100,0,0,0.5)'; ctx.lineWidth=1;
  [-4,0,4].forEach(x => {
    ctx.beginPath(); ctx.moveTo(x,-10); ctx.lineTo(x,8); ctx.stroke();
  });

  ctx.restore();
}

// ===================== RENDER MILES =====================
function renderMiles() {
  if (!milesVisible) return;
  miles.animT += 0.1;
  miles.x += miles.vx;
  // Bounce off screen edges (for animation before stopping)
  const sx = miles.x - camX;

  ctx.save();
  ctx.translate(sx, miles.y + Math.sin(miles.animT*2)*4);
  const dir = miles.vx < 0 ? 1 : -1;
  ctx.scale(dir, 1);

  // Miles - purple/black costume
  ctx.fillStyle='#1a0a2e'; // black legs
  ctx.fillRect(-6, 8, 5, 14);
  ctx.fillRect(1, 8, 5, 14);
  ctx.fillStyle='#0d0015';
  ctx.fillRect(-7,20,6,4);
  ctx.fillRect(1,20,6,4);
  // Body - purple/black
  ctx.fillStyle='#6b21a8';
  ctx.beginPath(); ctx.ellipse(0, 0, 11, 14, 0, 0, Math.PI*2); ctx.fill();
  // Red spider logo
  ctx.fillStyle='#e00';
  ctx.beginPath(); ctx.ellipse(0, -2, 4, 6, 0, 0, Math.PI*2); ctx.fill();
  // Arms
  ctx.fillStyle='#4a1080';
  ctx.fillRect(-14, -6, 12, 5);
  ctx.fillRect(2, -6, 12, 5);
  // Head
  ctx.fillStyle='#1a0a2e';
  ctx.beginPath(); ctx.arc(0, -18, 11, 0, Math.PI*2); ctx.fill();
  // Eyes - red/white
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-4,-20,5,3.5,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4,-20,5,3.5,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,0,180,0.4)';
  ctx.beginPath(); ctx.ellipse(-4,-20,5,3.5,-0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4,-20,5,3.5,0.3,0,Math.PI*2); ctx.fill();

  ctx.restore();

  // Label
  ctx.fillStyle='#a855f7';
  ctx.font='bold 12px Arial';
  ctx.textAlign='center';
  ctx.fillText('Майлз Моралес', sx, miles.y - 48);
  ctx.textAlign='left';
}

// ===================== RENDER INDICATOR (off-screen targets) =====================
function renderIndicator() {
  // Red arrow for drones, green for boss
  const targets = [];
  drones.forEach(d=>{ if(!d.dead) targets.push({x:d.x,y:d.y,col:'#f44'}); });
  if (boss && !boss.dead) targets.push({x:boss.x,y:boss.y,col:'#0f0'});
  civilians.forEach(c=>{ if(!c.saved) targets.push({x:c.x,y:c.y,col:'#ff0'}); });

  targets.forEach(t => {
    const sx = t.x - camX;
    if (sx > -40 && sx < W+40) return; // on screen
    const ang = Math.atan2(t.y - H/2, t.x - camX - W/2);
    const margin = 32;
    const px = Math.max(margin, Math.min(W-margin, W/2 + Math.cos(ang)*200));
    const py = Math.max(margin, Math.min(H-margin, H/2 + Math.sin(ang)*150));
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(ang);
    ctx.fillStyle=t.col;
    ctx.beginPath();
    ctx.moveTo(12,0); ctx.lineTo(-8,-7); ctx.lineTo(-8,7);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

// ===================== RENDER HUD CROSSHAIR =====================
function renderReticle() {
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(mouseX, mouseY, 10, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mouseX-15,mouseY); ctx.lineTo(mouseX-11,mouseY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mouseX+11,mouseY); ctx.lineTo(mouseX+15,mouseY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mouseX,mouseY-15); ctx.lineTo(mouseX,mouseY-11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mouseX,mouseY+11); ctx.lineTo(mouseX,mouseY+15); ctx.stroke();
}

// ===================== RENDER CHAPTER PROGRESS =====================
function renderProgress() {
  const ch = chapters[currentChapter];
  if (!ch || chapterState==='cutscene') return;
  let val=0, total=1, label='';
  if (ch.targetType==='distance') {
    val = Math.max(0, spidey.x - _startX);
    total = ch.targetVal;
    label = `${Math.floor(val)}/${total}м`;
  } else if (ch.targetType==='enemies') {
    val = spidey.chapterEnemiesKilled;
    total = ch.targetVal;
    label = `${val}/${total} врагов`;
  } else if (ch.targetType==='civilians') {
    val = spidey.chapterCivsSaved;
    total = ch.targetVal;
    label = `${val}/${total} спасено`;
  } else if (ch.targetType==='boss' && boss) {
    val = boss.maxHp - boss.hp;
    total = boss.maxHp;
    label = `ХП гоблина: ${boss.hp}`;
  } else return;

  const bw = 180, bh = 8;
  const bx = W/2 - bw/2, by = H-44;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx-2,by-2,bw+4,bh+4);
  ctx.fillStyle='#336'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#4af'; ctx.fillRect(bx,by,bw*Math.min(1,val/total),bh);
  ctx.fillStyle='#fff'; ctx.font='11px Arial'; ctx.textAlign='center';
  ctx.fillText(label, W/2, by-4);
  ctx.textAlign='left';
}

    <h1>ПОБЕДА! Нью-Йорк спасён!</h1>

function loseGame() {
  stopMusic();
  spidey.alive = false;
  spidey.web = null;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="emoji">💀</div>
    <h1>Питер побеждён...</h1>
    <p>МДж ждала до рассвета...<br>Но Спайдер-Мэн не вернулся.<br><br>Счёт: <b style="color:#ffe000">${spidey.score}</b></p>
    <button id="ovBtn">Попробовать снова</button>
  `;

function resetAll() {
  document.getElementById('overlay').style.display='none';
  document.getElementById('dialogBox').style.display='none';
  // Reset spidey
  spidey.x=300; spidey.y=300; spidey.vx=0; spidey.vy=0;
  spidey.hp=5; spidey.maxHp=5;
  spidey.bodyAngle=0; spidey.onGround=false;
  spidey.web=null; spidey.score=0; spidey.combo=0;
  spidey.coinsCollected=0; spidey.revived=false;
  spidey.knockedOut=false; spidey.knockTimer=0;
  spidey.totalDist=0; spidey._lastX=spidey.x;
  spidey.chapterEnemiesKilled=0; spidey.chapterCivsSaved=0;
  spidey.alive=true;
  // Reset world
  camX=0; drones=[]; bombs=[]; webShots=[]; civilians=[]; particles=[];
  boss=null; milesVisible=false;
  beatCount=0; melodyIdx=0;
  musicStarted=false;
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('comboBox').textContent='';
  updateHearts();
  currentChapter=-1;
  chapterState='idle';
  startChapter(0);
  startMusic();
}

// ===================== MILES COMPANION =====================
function updateMiles() {
  if (!milesVisible) return;
  // Miles follows spidey loosely
  const targetX = spidey.x - 80;
  const targetY = spidey.y;
  miles.vx += (targetX - miles.x) * 0.04;
  miles.vy += (targetY - miles.y) * 0.04;
  miles.vx *= 0.85; miles.vy *= 0.85;
  miles.x += miles.vx; miles.y += miles.vy;

  // Occasional dialog during ch13
  if (currentChapter===12 && Math.random()<0.001) {
    const lines = [
      {speaker:'🕷️ Майлз', text:'Питер, я прикрою тебя слева!', color:'#a855f7', duration:3000},
      {speaker:'🕷️ Майлз', text:'Вместе мы непобедимы!', color:'#a855f7', duration:2500},
      {speaker:'😊 Питер', text:'Хорошая работа, Майлз!', color:'#e00', duration:2500},
    ];
    if (!dlgPlaying) playDialog([lines[Math.floor(Math.random()*lines.length)]], ()=>{});
  }
}

// ===================== MAIN GAME LOOP =====================
let lastTime = 0;
let dt = 1;

function gameLoop(ts) {
  dt = Math.min(3, (ts - lastTime) / (1000/60));
  lastTime = ts;

  ctx.clearRect(0,0,W,H);

  renderBackground();
  renderBuildings();
  renderStreet();
  renderCoins();
  renderBombs();
  renderWebShots();
  renderParticles();
  renderCivilians();
  renderDrones();
  renderBoss();
  renderMiles();
  renderSpidey();
  renderIndicator();
  renderReticle();
  renderProgress();

  if (gameStarted && spidey.alive) {
    updatePhysics(dt);
    updateCoins();
    updateWebShots();
    updateDrones(dt);
    updateCivilians();
    updateBoss(dt);
    updateBombs(dt);
    updateParticles();
    updateMiles();
    checkChapterComplete();
  }

  requestAnimationFrame(gameLoop);
}

    <b>A/D</b> — управление в воздухе · <b>Пробел</b> — прыжок<br>
    <b>Shift</b> — подтянуться по паутине<br><br>
    15 глав, Майлз Моралес, Зелёный Гоблин и день рождения МДж!
  </p>
  <button id="ovBtn">🕷️ Начать приключение!</button>
`;
ov.style.display='flex';
document.getElementById('ovBtn').onclick = () => {
  initAudio();
  startMusic();
  ov.style.display='none';
  gameStarted=true;
  startChapter(0);
};

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
