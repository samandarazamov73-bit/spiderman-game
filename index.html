<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Человек-паук v4 — Полная история</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    user-select: none; touch-action: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; cursor: none; }
  .panel {
    position: fixed; color: #fff;
    background: rgba(0,0,0,0.55);
    padding: 10px 14px; border-radius: 10px;
    font-size: 13px; line-height: 1.5;
    backdrop-filter: blur(8px);
    pointer-events: none;
  }
  #help { top: 12px; left: 12px; border: 1px solid rgba(229,9,20,0.6); max-width: 270px; }
  #help b { color: #e50914; }
  #help kbd {
    background: #222; padding: 2px 6px; border-radius: 4px;
    border: 1px solid #444; font-size: 11px; font-family: monospace;
  }
  #hud { top: 12px; right: 12px; border: 1px solid rgba(60,120,255,0.6); text-align: right; min-width: 200px; }
  #hud .row { display: flex; justify-content: space-between; gap: 12px; }
  #hud b { color: #4af; }
  #hud .combo { color: #fbbf24; font-weight: bold; }
  #hud .hearts { font-size: 18px; letter-spacing: 2px; }
  #objective {
    bottom: 16px; left: 50%; transform: translateX(-50%);
    border: 1px solid rgba(251,191,36,0.7);
    text-align: center; min-width: 320px;
  }
  #objective .title { color: #fbbf24; font-weight: bold; font-size: 15px; margin-bottom: 4px; }
  #objective .progress { height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  #objective .bar { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); width: 0%; transition: width 0.3s; }
</style>
</head>
<body>
<div id="help" class="panel">
  <b>🕷️ Человек-паук v4</b><br>
  <kbd>ЛКМ</kbd> зажми — паутина<br>
  <kbd>ПКМ</kbd> / <kbd>F</kbd> — выстрел 🕸️<br>
  <kbd>A</kbd><kbd>D</kbd> — воздух<br>
  <kbd>Space</kbd> — прыжок<br>
  <kbd>Shift</kbd> — подтянуться
</div>
<div id="hud" class="panel">
  <div class="row">Жизни: <span class="hearts" id="hearts">❤❤❤❤</span></div>
  <div class="row">Расстояние: <b id="dist">0</b> м</div>
  <div class="row">Очки: <b id="score">0</b></div>
  <div class="row">Комбо: <span class="combo" id="combo">x1</span></div>
</div>

<div id="objective" class="panel">
  <div class="title" id="objTitle">Глава 1</div>
  <div id="objText">—</div>
  <div class="progress"><div class="bar" id="objBar"></div></div>
</div>
<div id="dialog" style="display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;color:#000;border:3px solid #000;border-radius:12px;padding:14px 22px;max-width:500px;min-width:280px;font-size:15px;line-height:1.4;box-shadow:6px 6px 0 #000,0 0 30px rgba(229,9,20,0.4);z-index:5;pointer-events:none;">
  <div class="who" id="who" style="font-weight:bold;color:#e50914;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Питер</div>
  <div id="line">…</div>
</div>
<div id="titlecard" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:8;pointer-events:none;background:rgba(0,0,0,0.4);">
  <div id="chapNum" style="color:#e50914;font-size:18px;letter-spacing:4px;font-weight:bold;text-shadow:0 0 20px rgba(229,9,20,0.8);">ГЛАВА 1</div>
  <div id="chapName" style="color:#fff;font-size:48px;font-weight:900;text-shadow:4px 4px 0 #000;letter-spacing:2px;">—</div>
</div>
<div id="endscreen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);color:#fff;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;cursor:pointer;">
  <h1 id="endTitle" style="font-size:48px;text-shadow:0 0 30px currentColor;">GAME OVER</h1>
  <p id="endMsg">—</p>
  <p>Очки: <b id="finalScore">0</b> · Расстояние: <b id="finalDist">0</b> м</p>
  <div style="background:#e50914;padding:12px 28px;border-radius:8px;font-weight:bold;font-size:16px;margin-top:8px;">Кликни для рестарта</div>
</div>
<div id="cutscene" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:15;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff;pointer-events:none;">
  <div id="csTitle" style="font-size:22px;color:#fbbf24;font-weight:bold;letter-spacing:2px;">—</div>
  <div id="csText" style="font-size:18px;max-width:500px;text-align:center;line-height:1.6;">—</div>
</div>
<canvas id="game"></canvas>
<script>
'use strict';

// ============ CANVAS ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize); resize();

// ============ AUDIO ============
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, dur, type = 'sine', vol = 0.15, sweep = 0) {
  try {
    const a = getAudio();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, a.currentTime);
    if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + sweep), a.currentTime + dur);
    gain.gain.setValueAtTime(vol, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.connect(gain).connect(a.destination);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch (e) {}
}
// Voice-like sounds for dialog
function voiceBeep(who) {
  const profiles = {
    'Питер': { f: 320, t: 'square', v: 0.06 },
    'Тётя Мэй': { f: 480, t: 'sine', v: 0.06 },
    'МДж': { f: 520, t: 'sine', v: 0.07 },
    'Гвен (рация)': { f: 440, t: 'triangle', v: 0.06 },
    'Гоблин': { f: 160, t: 'sawtooth', v: 0.08 },
    'Гоблин (вдали)': { f: 140, t: 'sawtooth', v: 0.06 },
    'Босс': { f: 100, t: 'sawtooth', v: 0.1 },
    'Телефон': { f: 800, t: 'square', v: 0.05 },
  };
  const p = profiles[who] || { f: 350, t: 'square', v: 0.06 };
  for (let i = 0; i < 4; i++) {
    setTimeout(() => beep(p.f + Math.random() * 80 - 40, 0.06, p.t, p.v), i * 70);
  }
}

// Background music loop
let musicPlaying = false;
let musicInterval = null;
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  const notes = [262,294,330,349,392,349,330,294];
  let idx = 0;
  musicInterval = setInterval(() => {
    if (game.state !== 'playing') return;
    beep(notes[idx % notes.length], 0.15, 'triangle', 0.04);
    beep(notes[idx % notes.length] / 2, 0.15, 'sine', 0.025);
    idx++;
  }, 400);
}
function stopMusic() {
  if (musicInterval) clearInterval(musicInterval);
  musicPlaying = false;
}

const SFX = {
  web:    () => beep(800, 0.08, 'square', 0.08, -400),
  shoot:  () => beep(1200, 0.06, 'square', 0.1, -800),
  release:() => beep(300, 0.05, 'triangle', 0.06),
  coin:   () => { beep(880, 0.05, 'square', 0.1); setTimeout(() => beep(1320, 0.08, 'square', 0.1), 50); },
  jump:   () => beep(400, 0.1, 'square', 0.08, 200),
  hit:    () => beep(120, 0.2, 'sawtooth', 0.2, -60),
  defeat: () => { beep(200, 0.1, 'sawtooth', 0.15); setTimeout(() => beep(150, 0.15, 'sawtooth', 0.15, -80), 80); },
  rescue: () => { beep(523, 0.08, 'triangle', 0.12); setTimeout(() => beep(659, 0.08, 'triangle', 0.12), 80); setTimeout(() => beep(784, 0.15, 'triangle', 0.12), 160); },
  chapter:() => { beep(523, 0.12, 'triangle', 0.15); setTimeout(() => beep(784, 0.12, 'triangle', 0.15), 120); setTimeout(() => beep(1047, 0.2, 'triangle', 0.15), 240); },
  bossHit:() => beep(80, 0.3, 'sawtooth', 0.25, -40),
  win:    () => { [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.2, 'triangle', 0.18), i*150)); },
  phone:  () => { for(let i=0;i<6;i++) setTimeout(()=>beep(800+(i%2)*200, 0.08, 'square', 0.1), i*120); },
  party:  () => { [523,659,784,880,1047].forEach((f,i) => setTimeout(() => beep(f, 0.1, 'triangle', 0.08), i*80)); },
};

// ============ STATE ============
const game = { cameraX: 0, gravity: 0.55, shake: 0, time: 0, state: 'playing', paused: false };

// ============ WORLD ============
const buildings = [];
const farBuildings = [];
const stars = [];
const clouds = [];

function generateBuildings(fromX, toX) {
  let x = fromX;
  while (x < toX) {
    const w = 80 + Math.random() * 120;
    const h = 220 + Math.random() * 380;
    buildings.push({
      x, w, h,
      color: `hsl(${215 + Math.random() * 30}, 22%, ${8 + Math.random() * 10}%)`,
      windowColor: `hsl(${40 + Math.random() * 20}, 90%, ${55 + Math.random() * 15}%)`,
      seed: Math.random() * 1000,
      hasAntenna: Math.random() > 0.6,
      hasWaterTower: Math.random() > 0.7,
    });
    x += w + 20 + Math.random() * 50;
  }
}
generateBuildings(-500, 5000);

let bfx = -200;
while (bfx < 6000) { const w = 60 + Math.random() * 80; farBuildings.push({ x: bfx, w, h: 150 + Math.random() * 220 }); bfx += w + 5; }
for (let i = 0; i < 150; i++) stars.push({ x: Math.random() * 6000, y: Math.random() * 320, r: Math.random() * 1.4 + 0.3, twinkle: Math.random() * Math.PI * 2 });
for (let i = 0; i < 8; i++) clouds.push({ x: Math.random() * 6000, y: 50 + Math.random() * 200, w: 80 + Math.random() * 120, vx: 0.1 + Math.random() * 0.2 });

// ============ ENTITIES ============
const coins = [];
const enemies = [];
const civilians = [];
const particles = [];
const webShots = [];
const bombs = [];
let boss = null;

function spawnCoins(fromX, toX) {
  for (let x = fromX; x < toX; x += 180 + Math.random() * 200)
    coins.push({ x: x + Math.random() * 100, y: 150 + Math.random() * 320, collected: false, phase: Math.random() * Math.PI * 2 });
}
function spawnEnemy(x, y) { enemies.push({ x, y, baseY: y, r: 18, alive: true, phase: Math.random() * Math.PI * 2 }); }
function spawnCivilian(x, y) { civilians.push({ x, y, rescued: false, wave: Math.random() * Math.PI * 2 }); }
function spawnParticles(x, y, count, color, opts = {}) {
  const speed = opts.speed || 4, life = opts.life || 30;
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, s = Math.random() * speed + 1;
    particles.push({ x, y, vx: Math.cos(a)*s+(opts.vx||0), vy: Math.sin(a)*s+(opts.vy||0), life, maxLife: life, color, r: Math.random()*3+1, gravity: opts.gravity!=null?opts.gravity:0.2 });
  }
}
spawnCoins(200, 5000);

// ============ SPIDEY ============
const spidey = {
  x: 200, y: 200, vx: 4, vy: 0, r: 14,
  onWeb: false, webX: 0, webY: 0, webLen: 0,
  angle: 0, angVel: 0, trail: [], jumps: 0, invuln: 0,
  health: 4, score: 0, combo: 1, comboTimer: 0,
  maxX: 0, shootCooldown: 0,
  enemiesDefeated: 0, civiliansSaved: 0, coinsCollected: 0,
};

// ============ INPUT ============
const keys = {};
let mouseDown = false;
const mouse = { x: W / 2, y: H / 2 };
function getEventPos(e) { return e.touches&&e.touches[0]?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY}; }
canvas.addEventListener('mousedown', e => { getAudio(); startMusic(); const p=getEventPos(e); mouse.x=p.x; mouse.y=p.y; if(e.button===2)shootWeb(); else{mouseDown=true;fireWeb();} e.preventDefault(); });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('mousemove', e => { const p=getEventPos(e); mouse.x=p.x; mouse.y=p.y; });
canvas.addEventListener('mouseup', e => { if(e.button!==2){mouseDown=false;releaseWeb();} e.preventDefault(); });
canvas.addEventListener('touchstart', e => { getAudio(); startMusic(); const p=getEventPos(e); mouse.x=p.x; mouse.y=p.y; if(e.touches.length>=2)shootWeb(); else{mouseDown=true;fireWeb();} e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchmove', e => { const p=getEventPos(e); mouse.x=p.x; mouse.y=p.y; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => { mouseDown=false; releaseWeb(); e.preventDefault(); });
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Space') {
    if(spidey.onWeb){releaseWeb();spidey.vy-=6;}
    else if(spidey.jumps<2){spidey.vy=-11;spidey.jumps++;SFX.jump();spawnParticles(spidey.x,spidey.y+14,6,'#ffffff',{speed:2,life:20,gravity:0.1});}
    e.preventDefault();
  }
  if (e.code==='KeyF'){shootWeb();e.preventDefault();}
});
window.addEventListener('keyup', e => { keys[e.code]=false; });

// ============ WEB SWING ============
function fireWeb() {
  if (game.paused) return;
  const worldMx=mouse.x+game.cameraX, worldMy=mouse.y;
  let bestX=worldMx, bestY=worldMy, bestScore=Infinity;
  const dirX=worldMx-spidey.x, dirY=worldMy-spidey.y;
  const dirLen=Math.sqrt(dirX*dirX+dirY*dirY)||1;
  const ndx=dirX/dirLen, ndy=dirY/dirLen;
  for (const b of buildings) {
    if(b.x+b.w<spidey.x-100) continue;
    if(b.x>spidey.x+800) break;
    for (const c of [{x:b.x+b.w/2,y:H-60-b.h},{x:b.x+8,y:H-60-b.h},{x:b.x+b.w-8,y:H-60-b.h}]) {
      if(c.y>=spidey.y-30) continue;
      const dx=c.x-spidey.x, dy=c.y-spidey.y;
      const len=Math.sqrt(dx*dx+dy*dy);
      const dot=(dx*ndx+dy*ndy)/len;
      if(dot<0.3) continue;
      const mDx=c.x-worldMx, mDy=c.y-worldMy;
      const score=mDx*mDx+mDy*mDy+(1-dot)*50000;
      if(score<bestScore){bestScore=score;bestX=c.x;bestY=c.y;}
    }
  }
  if(bestY>=spidey.y-20){bestX=spidey.x+ndx*300;bestY=spidey.y+ndy*300;if(bestY>spidey.y-80)bestY=spidey.y-200;}
  spidey.webX=bestX;spidey.webY=bestY;
  const dx=spidey.x-bestX, dy=spidey.y-bestY;
  spidey.webLen=Math.sqrt(dx*dx+dy*dy);
  spidey.angle=Math.atan2(dx,dy);
  const tx=Math.cos(spidey.angle), ty=-Math.sin(spidey.angle);
  spidey.angVel=(spidey.vx*tx+spidey.vy*ty)/spidey.webLen;
  spidey.onWeb=true; spidey.jumps=0;
  SFX.web();
  spawnParticles(bestX,bestY,8,'#ffffff',{speed:3,life:20,gravity:0});
}
function releaseWeb() {
  if(!spidey.onWeb) return;
  const tx=Math.cos(spidey.angle), ty=-Math.sin(spidey.angle);
  spidey.vx=spidey.angVel*spidey.webLen*tx*1.05;
  spidey.vy=spidey.angVel*spidey.webLen*ty*1.05;
  spidey.onWeb=false; SFX.release();
}

// ============ WEB SHOT ============
function shootWeb() {
  if(game.paused||spidey.shootCooldown>0) return;
  spidey.shootCooldown=15;
  const worldMx=mouse.x+game.cameraX, worldMy=mouse.y;
  let tx=worldMx, ty=worldMy;
  let bestEnemy=null, bestDot=0.7;
  const aimDx=worldMx-spidey.x, aimDy=worldMy-spidey.y;
  const aimLen=Math.sqrt(aimDx*aimDx+aimDy*aimDy)||1;
  const ax=aimDx/aimLen, ay=aimDy/aimLen;
  const allT=enemies.filter(e=>e.alive);
  if(boss) allT.push(boss);
  for(const e of allT){const dx=e.x-spidey.x,dy=e.y-spidey.y;const len=Math.sqrt(dx*dx+dy*dy);if(len>600)continue;const dot=(dx*ax+dy*ay)/len;if(dot>bestDot){bestDot=dot;bestEnemy=e;}}
  if(bestEnemy){tx=bestEnemy.x;ty=bestEnemy.y;}
  const dx=tx-spidey.x, dy=ty-spidey.y;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  webShots.push({x:spidey.x,y:spidey.y,vx:(dx/len)*18,vy:(dy/len)*18,life:50,trail:[]});
  SFX.shoot();
  spawnParticles(spidey.x,spidey.y,4,'#ffffff',{speed:2,life:12});
}

// ============ CUTSCENES & DIALOG ============
function showCutscene(title, text, duration, onDone) {
  game.paused = true;
  const cs = document.getElementById('cutscene');
  document.getElementById('csTitle').textContent = title;
  document.getElementById('csText').textContent = text;
  cs.style.display = 'flex';
  setTimeout(() => { cs.style.display = 'none'; game.paused = false; if(onDone) onDone(); }, duration);
}

function showTitleCard(ch) {
  const tc = document.getElementById('titlecard');
  document.getElementById('chapNum').textContent = `ГЛАВА ${ch.num}`;
  document.getElementById('chapName').textContent = ch.name;
  tc.style.display = 'flex';
  setTimeout(() => { tc.style.display = 'none'; }, 1700);
}

let dialogQueue = [];
function playDialog(lines, onDone) {
  dialogQueue = lines.slice();
  dialogQueue._onDone = onDone;
  showNextDialog();
}
function showNextDialog() {
  const d = document.getElementById('dialog');
  if (dialogQueue.length === 0) {
    d.style.display = 'none';
    if (dialogQueue._onDone) dialogQueue._onDone();
    return;
  }
  const line = dialogQueue.shift();
  document.getElementById('who').textContent = line.who;
  document.getElementById('line').textContent = line.text;
  d.style.display = 'block';
  voiceBeep(line.who);
  const dur = Math.max(140, line.text.length * 4);
  setTimeout(showNextDialog, dur * 16);
}

// ============ 10 STORY CHAPTERS ============
const chapters = [
  {
    num: 1, name: 'Тёплый вечер',
    intro: [{ who: 'Питер', text: 'Ещё один обычный патруль. Город такой красивый ночью...' }],
    objective: 'Раскачайся над городом (80 м)',
    targetType: 'distance', target: 80,
    onStart: () => {},
    outro: [{ who: 'Питер', text: 'Подожди... Сегодня же День Рождения МДж! Нужно лететь домой!' }],
  },
  {
    num: 2, name: 'День Рождения МДж',
    intro: [
      { who: 'Питер', text: 'Успел! МДж, с Днём Рождения!' },
      { who: 'МДж', text: 'Питер! Я думала ты забыл! Иди сюда, торт ждёт!' },
      { who: 'Питер', text: 'Как я мог забыть? Ты самое важное в моей жизни.' },
    ],
    objective: 'Собери 5 подарков (монет) для МДж',
    targetType: 'coins', target: 5,
    onStart: () => { SFX.party(); },
    outro: [
      { who: 'МДж', text: 'Спасибо, Питер! Это лучший день рождения!' },
      { who: 'Питер', text: 'Всё для тебя, Мэри Джейн.' },
    ],
  },
  {
    num: 3, name: 'Срочный вызов',
    intro: [
      { who: 'Телефон', text: '📞 ДЗЫЫНЬ! ДЗЫЫНЬ! ДЗЫЫНЬ!' },
      { who: 'Тётя Мэй', text: 'Питер! По новостям — дроны OsCorp атакуют Манхэттен!' },
      { who: 'МДж', text: 'Иди, Питер. Город нуждается в тебе.' },
      { who: 'Питер', text: 'Прости, МДж. Я вернусь. Обещаю.' },
    ],
    objective: 'Уничтожь 3 дронов (ПКМ/F — выстрел)',
    targetType: 'enemies', target: 3,
    onStart: () => {
      SFX.phone();
      spawnEnemy(spidey.x + 250, 220);
      spawnEnemy(spidey.x + 450, 280);
      spawnEnemy(spidey.x + 650, 200);
    },
    outro: [{ who: 'Питер', text: 'Это только начало. Кто управляет дронами?' }],
  },
  {
    num: 4, name: 'Заложники',
    intro: [
      { who: 'Гвен (рация)', text: 'Питер! Дроны захватили людей на крышах!' },
      { who: 'Питер', text: 'Лечу! Держитесь!' },
    ],
    objective: 'Спаси 3 жителей на крышах',
    targetType: 'civilians', target: 3,
    onStart: () => {
      let placed = 0;
      for (const b of buildings) {

let currentChapter = -1;
let chapterDone = false;

function startChapter(i) {
  currentChapter = i; chapterDone = false;
  const ch = chapters[i];
  spidey.enemiesDefeated = 0; spidey.civiliansSaved = 0; spidey.coinsCollected = 0;
  ch._startX = spidey.x;
  ch.onStart();
  showTitleCard(ch);
  updateObjectiveUI();
  SFX.chapter();
  setTimeout(() => playDialog(ch.intro, () => {}), 1800);
}
function updateObjectiveUI() {
  const ch = chapters[currentChapter]; if (!ch) return;
  document.getElementById('objTitle').textContent = `Глава ${ch.num}: ${ch.name}`;
  document.getElementById('objText').textContent = ch.objective;
  let progress = 0;
  if (ch.targetType==='distance') progress = Math.min(1, ((spidey.maxX-ch._startX)/10)/ch.target);
  else if (ch.targetType==='enemies') progress = Math.min(1, spidey.enemiesDefeated/ch.target);
  else if (ch.targetType==='civilians') progress = Math.min(1, spidey.civiliansSaved/ch.target);
  else if (ch.targetType==='boss') progress = boss ? 1-(boss.hp/boss.maxHp) : 1;
  else if (ch.targetType==='coins') progress = Math.min(1, spidey.coinsCollected/ch.target);
  document.getElementById('objBar').style.width = (progress*100)+'%';
}
function checkChapterComplete() {
  const ch = chapters[currentChapter]; if (!ch||chapterDone) return;
  let done = false;
  if (ch.targetType==='distance') done = (spidey.maxX-ch._startX)/10>=ch.target;
  else if (ch.targetType==='enemies') done = spidey.enemiesDefeated>=ch.target;
  else if (ch.targetType==='civilians') done = spidey.civiliansSaved>=ch.target;
  else if (ch.targetType==='boss') done = !boss;
  else if (ch.targetType==='coins') done = spidey.coinsCollected>=ch.target;
  if (done) {
    chapterDone = true;
    playDialog(ch.outro, () => {
      if (currentChapter+1<chapters.length) startChapter(currentChapter+1);
      else winGame();
    });
  }
}

// ============ UPDATE ============
function update() {
  game.time++;
  if (game.state!=='playing'||game.paused) return;
  const inputX=(keys['KeyD']||keys['ArrowRight']?1:0)-(keys['KeyA']||keys['ArrowLeft']?1:0);
  if (spidey.onWeb) {
    const gT=-(game.gravity/spidey.webLen)*Math.sin(spidey.angle);
    spidey.angVel+=gT; spidey.angVel+=inputX*0.0015; spidey.angVel*=0.9995;
    const pull=(keys['ShiftLeft']||keys['ShiftRight'])?2.5:0.4;
    spidey.webLen=Math.max(50,spidey.webLen-pull);
    spidey.angle+=spidey.angVel;
    spidey.x=spidey.webX+Math.sin(spidey.angle)*spidey.webLen;
    spidey.y=spidey.webY+Math.cos(spidey.angle)*spidey.webLen;
  } else {
    spidey.vy+=game.gravity; spidey.vx+=inputX*0.4; spidey.vx*=0.995;
    spidey.x+=spidey.vx; spidey.y+=spidey.vy;
  }
  if(spidey.shootCooldown>0) spidey.shootCooldown--;
  const groundLine=H-60;
  if(spidey.y>groundLine){
    spidey.y=groundLine;
    if(Math.abs(spidey.vy)>3)spawnParticles(spidey.x,spidey.y+5,8,'#888',{speed:3,life:20});
    spidey.vy=-Math.abs(spidey.vy)*0.35;spidey.vx*=0.85;spidey.jumps=0;
  }
  if(spidey.y<20){spidey.y=20;spidey.vy=Math.abs(spidey.vy)*0.5;}
  spidey.trail.push({x:spidey.x,y:spidey.y});
  if(spidey.trail.length>14) spidey.trail.shift();
  const speed=Math.sqrt(spidey.vx*spidey.vx+spidey.vy*spidey.vy)||Math.abs(spidey.angVel*spidey.webLen);
  const lookAhead=Math.max(-100,Math.min(200,spidey.vx*8));
  game.cameraX+=((spidey.x-W*0.35+lookAhead)-game.cameraX)*0.08;
  game.cameraX=Math.max(-200,game.cameraX);
  game.shake*=0.85;
  if(spidey.x>spidey.maxX) spidey.maxX=spidey.x;
  document.getElementById('dist').textContent=Math.floor(spidey.maxX/10);
  document.getElementById('score').textContent=spidey.score;
  document.getElementById('combo').textContent='x'+spidey.combo;
  if(spidey.comboTimer>0){spidey.comboTimer--;if(spidey.comboTimer===0)spidey.combo=1;}
  const lastB=buildings[buildings.length-1];
  if(lastB.x<game.cameraX+W+1500){const sx=lastB.x+lastB.w;generateBuildings(sx,sx+2000);spawnCoins(sx,sx+2000);}
  // Coins
  for(const c of coins){
    if(c.collected) continue; c.phase+=0.08;
    const dx=c.x-spidey.x,dy=c.y-spidey.y;
    if(dx*dx+dy*dy<32*32){
      c.collected=true;spidey.coinsCollected++;spidey.score+=10*spidey.combo;
      spidey.combo=Math.min(spidey.combo+1,9);spidey.comboTimer=180;SFX.coin();
      spawnParticles(c.x,c.y,10,'#fbbf24',{speed:3,life:25,gravity:0.1});
    }
  }
  // Web shots
  for(let i=webShots.length-1;i>=0;i--){
    const s=webShots[i];s.trail.push({x:s.x,y:s.y});if(s.trail.length>6)s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;s.life--;let hit=false;
    for(const e of enemies){if(!e.alive)continue;const dx=e.x-s.x,dy=e.y-s.y;
      if(dx*dx+dy*dy<(e.r+6)*(e.r+6)){e.alive=false;spidey.enemiesDefeated++;spidey.score+=50*spidey.combo;
        spidey.combo=Math.min(spidey.combo+1,9);spidey.comboTimer=180;SFX.defeat();game.shake=6;
        spawnParticles(e.x,e.y,16,'#f87171',{speed:5,life:30});spawnParticles(e.x,e.y,6,'#fff',{speed:3,life:20});hit=true;break;}}
    if(!hit&&boss){const dx=boss.x-s.x,dy=boss.y-s.y;
      if(dx*dx+dy*dy<(boss.r+6)*(boss.r+6)){boss.hp--;boss.hitFlash=12;SFX.bossHit();game.shake=10;
        spawnParticles(s.x,s.y,12,'#4ade80',{speed:4,life:25});
        if(boss.hp<=0){spawnParticles(boss.x,boss.y,40,'#4ade80',{speed:6,life:50});spawnParticles(boss.x,boss.y,30,'#fbbf24',{speed:5,life:50});
          spidey.score+=500;game.shake=20;boss=null;}hit=true;}}
    if(hit||s.life<=0||s.x<game.cameraX-100||s.x>game.cameraX+W+100)webShots.splice(i,1);
  }
  // Enemies
  for(const e of enemies){if(!e.alive)continue;e.phase+=0.04;e.y=e.baseY+Math.sin(e.phase)*25;
    const dx=spidey.x-e.x,dy=spidey.y-e.y;const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<200)e.x+=(dx/dist)*0.2;
    if(dist<e.r+spidey.r&&spidey.invuln<=0){
      if(speed>9){e.alive=false;spidey.enemiesDefeated++;spidey.score+=30*spidey.combo;SFX.defeat();game.shake=6;spawnParticles(e.x,e.y,14,'#f87171',{speed:4,life:25});}
      else{spidey.health--;spidey.invuln=90;SFX.hit();game.shake=14;spidey.vx=-Math.sign(dx)*8;spidey.vy=-8;
        if(spidey.onWeb)releaseWeb();spawnParticles(spidey.x,spidey.y,12,'#fca5a5',{speed:4,life:25});updateHearts();if(spidey.health<=0)loseGame();}
    }
  }
  // Civilians
  for(const c of civilians){if(c.rescued)continue;c.wave+=0.08;const dx=c.x-spidey.x,dy=c.y-spidey.y;
    if(dx*dx+dy*dy<35*35){c.rescued=true;spidey.civiliansSaved++;spidey.score+=100*spidey.combo;
      spidey.combo=Math.min(spidey.combo+1,9);spidey.comboTimer=240;SFX.rescue();
      spawnParticles(c.x,c.y,16,'#4ade80',{speed:3,life:35,gravity:-0.05});}}
  // Boss
  if(boss){boss.phase+=0.04;if(boss.hitFlash>0)boss.hitFlash--;
    const dx=spidey.x-boss.x,dy=spidey.y-boss.y;const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const pull=(dist-280)*0.001;boss.vx+=(dx/dist)*pull*5;boss.vy+=(dy/dist)*pull*5+Math.sin(boss.phase*2)*0.05;
    boss.vx*=0.93;boss.vy*=0.93;boss.x+=boss.vx;boss.y+=boss.vy;
    if(boss.y>H-200){boss.y=H-200;boss.vy*=-0.5;}if(boss.y<80){boss.y=80;boss.vy*=-0.5;}
    boss.bombCooldown--;if(boss.bombCooldown<=0){bombs.push({x:boss.x,y:boss.y+20,vx:0,vy:1,fuse:100,r:8});boss.bombCooldown=90+Math.random()*60;}
    if(Math.abs(dx)<boss.r+spidey.r&&Math.abs(dy)<boss.r+spidey.r&&spidey.invuln<=0){
      spidey.health--;spidey.invuln=90;SFX.hit();game.shake=14;spidey.vx=-Math.sign(dx)*10;spidey.vy=-8;
      if(spidey.onWeb)releaseWeb();updateHearts();if(spidey.health<=0)loseGame();}}
  // Bombs
  for(let i=bombs.length-1;i>=0;i--){const b=bombs[i];b.vy+=0.25;b.x+=b.vx;b.y+=b.vy;b.fuse--;
    if(b.y>H-60||b.fuse<=0){spawnParticles(b.x,b.y,24,'#f97316',{speed:6,life:30});spawnParticles(b.x,b.y,12,'#fbbf24',{speed:4,life:25});
      game.shake=10;beep(80,0.3,'sawtooth',0.2,-40);
      const dx=spidey.x-b.x,dy=spidey.y-b.y;
      if(dx*dx+dy*dy<70*70&&spidey.invuln<=0){spidey.health--;spidey.invuln=90;SFX.hit();spidey.vx=-Math.sign(dx||1)*6;spidey.vy=-10;
        if(spidey.onWeb)releaseWeb();updateHearts();if(spidey.health<=0)loseGame();}
      bombs.splice(i,1);}}
  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.98;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(const c of clouds){c.x-=c.vx;if(c.x+c.w<game.cameraX-200)c.x=game.cameraX+W+200;}
  if(spidey.invuln>0) spidey.invuln--;
  updateObjectiveUI(); checkChapterComplete();
}

    ctx.fillStyle='rgba(255,220,100,0.25)';for(let i=0;i<6;i++){const wy=H-60-b.h+20+i*32;if(wy>H-80)break;ctx.fillRect(sx+10,wy,6,8);ctx.fillRect(sx+b.w-16,wy,6,8);}}

function drawBuildings(){
  for(const b of buildings){const sx=b.x-game.cameraX;if(sx+b.w<-50||sx>W+50)continue;const sy=H-60-b.h;
    ctx.fillStyle=b.color;ctx.fillRect(sx,sy,b.w,b.h);

    if(b.hasAntenna){ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx+b.w/2,sy);ctx.lineTo(sx+b.w/2,sy-25);ctx.stroke();
      if(Math.floor(game.time/30)%2===0){ctx.fillStyle='#ff0040';ctx.shadowColor='#ff0040';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(sx+b.w/2,sy-25,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}
    const cols=Math.floor(b.w/18),rows=Math.floor(b.h/24);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      const lit=Math.sin(b.seed+r*1.3+c*2.7)>0.3;

  ctx.strokeStyle='#fbbf24';ctx.lineWidth=3;ctx.setLineDash([20,20]);ctx.lineDashOffset=-game.cameraX%40;ctx.beginPath();ctx.moveTo(0,H-30);ctx.lineTo(W,H-30);ctx.stroke();ctx.setLineDash([]);}

  ctx.save();ctx.translate(sx,e.y);ctx.fillStyle='#2a2a3a';ctx.beginPath();ctx.arc(0,0,e.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#f87171';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  const rot=game.time*0.8;ctx.strokeStyle='rgba(200,200,220,0.6)';ctx.lineWidth=2;
  for(const side of[-1,1]){const px=side*(e.r+6);ctx.fillStyle='#444';ctx.fillRect(px-2,-2,4,4);ctx.beginPath();ctx.moveTo(px-Math.cos(rot)*8,-Math.sin(rot)*2);ctx.lineTo(px+Math.cos(rot)*8,Math.sin(rot)*2);ctx.stroke();}
  ctx.restore();}}
function drawCivilians(){for(const c of civilians){if(c.rescued)continue;const sx=c.x-game.cameraX;if(sx<-50||sx>W+50)continue;
  const armWave=Math.sin(c.wave)*0.6;ctx.save();ctx.translate(sx,c.y);
  ctx.fillStyle='#4ade80';ctx.fillRect(-4,0,8,12);ctx.fillStyle='#fde68a';ctx.beginPath();ctx.arc(0,-4,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#4ade80';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-3,2);ctx.lineTo(-7+armWave*2,-2-Math.abs(armWave)*6);ctx.moveTo(3,2);ctx.lineTo(7-armWave*2,-2-Math.abs(armWave)*6);ctx.stroke();
  const bobY=-20+Math.sin(c.wave*1.5)*3;ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=8;ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('!',0,bobY);ctx.shadowBlur=0;ctx.restore();}}
function drawWebShots(){for(const s of webShots){const sx=s.x-game.cameraX;
  for(let i=0;i<s.trail.length;i++){ctx.globalAlpha=i/s.trail.length*0.6;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.trail[i].x-game.cameraX,s.trail[i].y,3,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(sx,s.y,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}
function drawBombs(){for(const b of bombs){const sx=b.x-game.cameraX;ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(sx,b.y,b.r,0,Math.PI*2);ctx.fill();
  if(Math.sin(b.fuse*0.4)>0){ctx.fillStyle='#fbbf24';ctx.shadowColor='#f97316';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(sx+4,b.y-b.r-2,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}}}

function drawBoss(){if(!boss)return;const sx=boss.x-game.cameraX;
  ctx.save();ctx.translate(sx,boss.y);ctx.fillStyle='#581c87';ctx.beginPath();ctx.moveTo(-40,8);ctx.lineTo(-20,0);ctx.lineTo(20,0);ctx.lineTo(40,8);ctx.lineTo(20,14);ctx.lineTo(-20,14);ctx.closePath();ctx.fill();
  ctx.fillStyle='#7c3aed';ctx.beginPath();ctx.moveTo(-40,8);ctx.lineTo(-30,18);ctx.lineTo(-20,14);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(40,8);ctx.lineTo(30,18);ctx.lineTo(20,14);ctx.closePath();ctx.fill();
  const flash=boss.hitFlash>0;ctx.fillStyle=flash?'#fff':'#16a34a';ctx.beginPath();ctx.ellipse(0,-8,10,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=flash?'#fff':'#22c55e';ctx.beginPath();ctx.arc(0,-22,9,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(-7,-28);ctx.lineTo(-12,-36);ctx.lineTo(-4,-27);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(7,-28);ctx.lineTo(12,-36);ctx.lineTo(4,-27);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(-3,-22,1.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,-22,1.8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='#000';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(0,-19,4,0.2,Math.PI-0.2);ctx.stroke();ctx.restore();
  const barW=80,barH=6,bx=sx-barW/2,by=boss.y-56;
  ctx.fillStyle='#000';ctx.fillRect(bx-2,by-2,barW+4,barH+4);ctx.fillStyle='#7f1d1d';ctx.fillRect(bx,by,barW,barH);
  ctx.fillStyle='#22c55e';ctx.fillRect(bx,by,barW*(boss.hp/boss.maxHp),barH);
  ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('ЗЕЛЁНЫЙ ГОБЛИН',sx,by-6);}
function drawParticles(){for(const p of particles){ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x-game.cameraX,p.y,p.r,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
function drawWeb(){if(!spidey.onWeb)return;const sx=spidey.x-game.cameraX,sy=spidey.y,wx=spidey.webX-game.cameraX,wy=spidey.webY;
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(wx,wy);ctx.stroke();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(wx,wy,3,0,Math.PI*2);ctx.fill();}
function drawSpidey(){
  const sx=spidey.x-game.cameraX, sy=spidey.y;
  const speed=Math.sqrt(spidey.vx*spidey.vx+spidey.vy*spidey.vy)||Math.abs(spidey.angVel*spidey.webLen);
  if(speed>8){ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;for(let i=0;i<6;i++){const off=(game.time*4+i*30)%100;ctx.beginPath();ctx.moveTo(sx-30-off,sy+(i-3)*8);ctx.lineTo(sx-50-off,sy+(i-3)*8);ctx.stroke();}}
  for(let i=0;i<spidey.trail.length-1;i++){const t=spidey.trail[i];ctx.globalAlpha=(i/spidey.trail.length)*0.35;ctx.fillStyle='#e50914';ctx.beginPath();ctx.arc(t.x-game.cameraX,t.y,spidey.r*(i/spidey.trail.length),0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  if(spidey.invuln>0&&Math.floor(spidey.invuln/5)%2===0) return;
  // FIXED: proper body angle — stands upright on ground!
  let bodyAngle;
  if(spidey.onWeb){bodyAngle=-spidey.angle+(spidey.angVel>0?0.3:-0.3);}
  else if(spidey.y>=H-61){bodyAngle=0;} // On ground = stand upright
  else{const sp=Math.sqrt(spidey.vx*spidey.vx+spidey.vy*spidey.vy);bodyAngle=sp<2?0:Math.atan2(spidey.vy,spidey.vx)-Math.PI/2;}
  ctx.save();ctx.translate(sx,sy);ctx.rotate(bodyAngle);
  ctx.fillStyle='#e50914';ctx.beginPath();ctx.ellipse(0,0,9,14,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1d4ed8';ctx.beginPath();ctx.ellipse(0,8,8,8,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#7a0008';ctx.lineWidth=0.6;for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(-8,i*4);ctx.lineTo(8,i*4);ctx.stroke();ctx.beginPath();ctx.moveTo(i*4,-10);ctx.lineTo(i*4,6);ctx.stroke();}
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(0,0,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e50914';ctx.lineWidth=4;ctx.lineCap='round';
  if(spidey.onWeb){ctx.beginPath();ctx.moveTo(-3,-8);ctx.lineTo(-2,-22);ctx.moveTo(3,-8);ctx.lineTo(2,-22);ctx.stroke();}
  else{ctx.beginPath();ctx.moveTo(-7,-4);ctx.lineTo(-14,6);ctx.moveTo(7,-4);ctx.lineTo(14,6);ctx.stroke();}
  ctx.strokeStyle='#1d4ed8';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(-4,12);ctx.lineTo(-8,22);ctx.moveTo(4,12);ctx.lineTo(8,22);ctx.stroke();
  ctx.fillStyle='#e50914';ctx.beginPath();ctx.arc(0,-14,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-3,-15,2.5,3,-0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(3,-15,2.5,3,0.3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#000';ctx.lineWidth=0.8;ctx.beginPath();ctx.ellipse(-3,-15,2.5,3,-0.3,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.ellipse(3,-15,2.5,3,0.3,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}
function drawTargetIndicator(){
  const ch=chapters[currentChapter];if(!ch)return;
  if(ch.targetType!=='enemies'&&ch.targetType!=='boss') return;
  let target=null,bestDist=Infinity;
  const cands=ch.targetType==='boss'?(boss?[boss]:[]):enemies.filter(e=>e.alive);
  for(const e of cands){const dx=e.x-spidey.x,dy=e.y-spidey.y;const d=dx*dx+dy*dy;if(d<bestDist){bestDist=d;target=e;}}
  if(!target) return;
  const tsx=target.x-game.cameraX,tsy=target.y;
  if(tsx>30&&tsx<W-30&&tsy>30&&tsy<H-30) return;
  const cx=W/2,cy=H/2,dx=tsx-cx,dy=tsy-cy,margin=50;
  const sxM=(W/2-margin)/Math.abs(dx),syM=(H/2-margin)/Math.abs(dy);
  const t=Math.min(sxM,syM),ax=cx+dx*t,ay=cy+dy*t,angle=Math.atan2(dy,dx);
  ctx.save();ctx.translate(ax,ay);ctx.rotate(angle);
  const pulse=1+Math.sin(game.time*0.15)*0.15;ctx.scale(pulse,pulse);
  ctx.fillStyle=ch.targetType==='boss'?'#22c55e':'#f87171';ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(0,-10);ctx.lineTo(0,-4);ctx.lineTo(-12,-4);ctx.lineTo(-12,4);ctx.lineTo(0,4);ctx.lineTo(0,10);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;ctx.restore();
}
function drawAimReticle(){const x=mouse.x,y=mouse.y,t=game.time*0.05;
  const ready=spidey.shootCooldown<=0;ctx.strokeStyle=mouseDown?'#fbbf24':(ready?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.3)');ctx.lineWidth=1.5;
  const r=12+Math.sin(t)*2;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-r-4,y);ctx.lineTo(x-r+2,y);ctx.moveTo(x+r-2,y);ctx.lineTo(x+r+4,y);ctx.moveTo(x,y-r-4);ctx.lineTo(x,y-r+2);ctx.moveTo(x,y+r-2);ctx.lineTo(x,y+r+4);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();}
function render(){ctx.save();ctx.clearRect(0,0,W,H);applyShake();drawBackground();drawBuildings();drawCivilians();drawStreet();drawCoins();drawEnemies();drawBoss();drawBombs();drawWeb();drawWebShots();drawSpidey();drawParticles();ctx.restore();drawTargetIndicator();drawAimReticle();}

// ============ MAIN ============
function loop(){update();render();requestAnimationFrame(loop);}
loop();
startChapter(0);
</script>
</body>
</html>
